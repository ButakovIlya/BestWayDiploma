services:
  db:
    image: postgres:15-alpine
    container_name: bestway-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB__PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bestway

  redis:
    image: redis:7-alpine
    container_name: bestway-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - bestway

  backend:
    build:
      context: ./BestWay
    image: bestway-backend:local
    pull_policy: build
    container_name: bestway-backend
    restart: unless-stopped
    command: >
      bash -c "alembic upgrade head &&
      uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS}"
    environment:
      PYTHONPATH: ${PYTHONPATH}
      PYTHONUNBUFFERED: 1
      APP__TITTLE: ${APP__TITTLE}
      APP__VERSION: ${APP__VERSION}
      APP__DEBUG: ${APP__DEBUG}
      APP__BASE_URL: ${APP__BASE_URL}
      UPTRACE__ENABLED: ${UPTRACE__ENABLED}
      UPTRACE__DSN: ${UPTRACE__DSN}
      DB__NAME: ${DB__NAME}
      DB__USER: ${DB__USER}
      DB__PASSWORD: ${DB__PASSWORD}
      DB__HOST: db
      DB__PORT: 5432
      DB__POOL_SIZE: ${DB__POOL_SIZE}
      DB__MAX_OVERFLOW: ${DB__MAX_OVERFLOW}
      JWT__SECRET_KEY: ${JWT__SECRET_KEY}
      JWT__ALGORITHM: ${JWT__ALGORITHM}
      REDIS__HOST: redis://redis:6379/2
      TASK__APP_NAME: ${TASK__APP_NAME}
      TASK__BROKER_URL: redis://redis:6379/0
      TASK__RESULT_URL: redis://redis:6379/1
      SMS__SERVICE_URL: ${SMS__SERVICE_URL}
      SMS__API_KEY: ${SMS__API_KEY}
      SMS__CACHE_TIMEOUT: ${SMS__CACHE_TIMEOUT}
      CHATGPT__SERVICE_URL: ${CHATGPT__SERVICE_URL}
      CHATGPT__API_KEY: ${CHATGPT__API_KEY}
      CHATGPT__MODEL: ${CHATGPT__MODEL}
      CHATGPT__MAX_RESPONSES_PER_DAY: ${CHATGPT__MAX_RESPONSES_PER_DAY}
      CHATGPT__REQUEST_DELAY: ${CHATGPT__REQUEST_DELAY}
      CHATGPT__MAX_REQUEST_RETRIES: ${CHATGPT__MAX_REQUEST_RETRIES}
      PROXY__HOST: ${PROXY__HOST}
      PROXY__HTTP_PORT: ${PROXY__HTTP_PORT}
      PROXY__SOCKS5_PORT: ${PROXY__SOCKS5_PORT}
      PROXY__USERNAME: ${PROXY__USERNAME}
      PROXY__PASSWORD: ${PROXY__PASSWORD}
      PUSHER__APP_ID: ${PUSHER__APP_ID}
      PUSHER__KEY: ${PUSHER__KEY}
      PUSHER__SECRET: ${PUSHER__SECRET}
      PUSHER__CLUSTER: ${PUSHER__CLUSTER}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-media:/src/storage/media
    networks:
      bestway:
        aliases:
          - web

  backend-nginx:
    image: nginx:1.27-alpine
    container_name: bestway-backend-nginx
    restart: unless-stopped
    ports:
      - "${BACKEND_HTTP_PORT}:80"
    depends_on:
      - backend
    volumes:
      - ./BestWay/config/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
      - backend-media:/app/storage/media:ro
    networks:
      - bestway

  celery-default:
    build:
      context: ./BestWay
    image: bestway-backend:local
    pull_policy: build
    container_name: bestway-celery-default
    restart: unless-stopped
    command: celery -A src.worker:app worker --loglevel=info --hostname=bestway
    environment:
      PYTHONPATH: ${PYTHONPATH}
      PYTHONUNBUFFERED: 1
      APP__TITTLE: ${APP__TITTLE}
      APP__VERSION: ${APP__VERSION}
      APP__DEBUG: ${APP__DEBUG}
      APP__BASE_URL: ${APP__BASE_URL}
      UPTRACE__ENABLED: ${UPTRACE__ENABLED}
      UPTRACE__DSN: ${UPTRACE__DSN}
      DB__NAME: ${DB__NAME}
      DB__USER: ${DB__USER}
      DB__PASSWORD: ${DB__PASSWORD}
      DB__HOST: db
      DB__PORT: 5432
      JWT__SECRET_KEY: ${JWT__SECRET_KEY}
      JWT__ALGORITHM: ${JWT__ALGORITHM}
      REDIS__HOST: redis://redis:6379/2
      TASK__APP_NAME: ${TASK__APP_NAME}
      TASK__BROKER_URL: redis://redis:6379/0
      TASK__RESULT_URL: redis://redis:6379/1
      SMS__SERVICE_URL: ${SMS__SERVICE_URL}
      SMS__API_KEY: ${SMS__API_KEY}
      SMS__CACHE_TIMEOUT: ${SMS__CACHE_TIMEOUT}
      CHATGPT__SERVICE_URL: ${CHATGPT__SERVICE_URL}
      CHATGPT__API_KEY: ${CHATGPT__API_KEY}
      CHATGPT__MODEL: ${CHATGPT__MODEL}
      CHATGPT__MAX_RESPONSES_PER_DAY: ${CHATGPT__MAX_RESPONSES_PER_DAY}
      CHATGPT__REQUEST_DELAY: ${CHATGPT__REQUEST_DELAY}
      CHATGPT__MAX_REQUEST_RETRIES: ${CHATGPT__MAX_REQUEST_RETRIES}
      PROXY__HOST: ${PROXY__HOST}
      PROXY__HTTP_PORT: ${PROXY__HTTP_PORT}
      PROXY__SOCKS5_PORT: ${PROXY__SOCKS5_PORT}
      PROXY__USERNAME: ${PROXY__USERNAME}
      PROXY__PASSWORD: ${PROXY__PASSWORD}
      PUSHER__APP_ID: ${PUSHER__APP_ID}
      PUSHER__KEY: ${PUSHER__KEY}
      PUSHER__SECRET: ${PUSHER__SECRET}
      PUSHER__CLUSTER: ${PUSHER__CLUSTER}
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - backend-media:/src/storage/media
    networks:
      - bestway

  flower:
    build:
      context: ./BestWay
    image: bestway-backend:local
    pull_policy: build
    container_name: bestway-flower
    restart: unless-stopped
    command: celery -A src.worker:app flower --port=5555
    environment:
      PYTHONPATH: ${PYTHONPATH}
      TASK__APP_NAME: ${TASK__APP_NAME}
      TASK__BROKER_URL: redis://redis:6379/0
      TASK__RESULT_URL: redis://redis:6379/1
      PUSHER__APP_ID: ${PUSHER__APP_ID}
      PUSHER__KEY: ${PUSHER__KEY}
      PUSHER__SECRET: ${PUSHER__SECRET}
      PUSHER__CLUSTER: ${PUSHER__CLUSTER}
    ports:
      - "${FLOWER_PORT}:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bestway

  frontend:
    image: node:22-alpine
    container_name: bestway-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --ignore-scripts && npm run build && npm run start -- -H 0.0.0.0 -p 3000"
    environment:
      NODE_ENV: production
      HUSKY: 0
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_BACKEND_API_URL: ${NEXT_PUBLIC_BACKEND_API_URL}
      NEXT_PUBLIC_PUSHER_APP_KEY: ${PUSHER__KEY}
      NEXT_PUBLIC_PUSHER_CLUSTER: ${PUSHER__CLUSTER}
      NEXT_PUBLIC_YANDEX_MAP_KEY: ${NEXT_PUBLIC_YANDEX_MAP_KEY}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    volumes:
      - ./BestayUI:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next:/app/.next
    networks:
      - bestway

volumes:
  postgres-data:
  redis-data:
  backend-media:
  frontend-node-modules:
  frontend-next:

networks:
  bestway:
    driver: bridge
